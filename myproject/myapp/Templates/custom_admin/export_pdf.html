<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .meta {
            text-align: right;
            font-size: 0.9em;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background-color: #34495e;
            color: white;
            text-align: left;
            padding: 12px;
            font-size: 0.9em;
        }
        td {
            border-bottom: 1px solid #ecf0f1;
            padding: 10px;
            font-size: 0.85em;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.8em;
            color: #bdc3c7;
        }
        @page {
            size: A4;
            margin: 1cm;
        }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>
    <div class="meta">
        Exported on: {{ date }}
    </div>
    
    <table>
        <thead>
            <tr>
                {% for header in headers %}
                <th>{{ header }}</th>
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for row in rows %}
            <tr>
                {% for cell in row %}
                <td>{{ cell }}</td>
                {% endfor %}
            </tr>
            {% endfor %}
        </tbody>
    </table>
    
    <div class="footer">
        Electro Admin Portal - Data Export
    </div>
</body>
</html>
